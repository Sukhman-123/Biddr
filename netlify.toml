# ===========================================================
# Netlify configuration for the Biddr front-end.
# Deploy: https://app.netlify.com/ → Add new site → "Import
# an existing project" → pick this repo. Netlify reads this
# file automatically; no further setup is needed.
# ===========================================================

[build]
  # Vite outputs the production bundle to ./dist
  base    = "client"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  # Tell Netlify the build is a Vite SPA so it auto-sets
  # the right asset caching headers.
  NPM_FLAGS    = "--no-audit --no-fund"
  # Netlify's secrets scanner treats any VITE_* env var as a secret
  # by default, but VITE_API_BASE and VITE_SOCKET_BASE are just
  # URL paths (e.g. "/api" and "") — not secrets. Tell the scanner
  # to ignore them so the build doesn't fail on a false positive.
  # The actual Google OAuth client ID is also safe to commit (it's
  # designed to be public).
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_BASE,VITE_SOCKET_BASE,VITE_GOOGLE_CLIENT_ID"

# ===========================================================
# API + Socket.IO proxy → Render backend.
# ===========================================================
# IMPORTANT: these rules MUST be listed BEFORE the SPA fallback
# below. Netlify's redirect engine matches the FIRST rule that
# fits, so if `/*` is on top it catches /api/* and returns
# index.html (the symptom is /api/auth/register returning HTML
# instead of JSON). The `force = true` flag tells Netlify to
# override any other matching rule.
#
# This means the browser always talks to the same origin
# (biddr.netlify.app), so we sidestep CORS entirely and
# Socket.IO's WebSocket upgrade just works.
#
# If you ever rename the Render service, update both `to`
# values below and commit — Netlify will redeploy.
# ===========================================================
[[redirects]]
  from = "/api/*"
  to   = "https://biddr-34vz.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to   = "https://biddr-34vz.onrender.com/socket.io/:splat"
  status = 200
  force = true

# ===========================================================
# SPA fallback — listed LAST so the API rules above win.
# Every unknown route serves index.html so client-side
# routing (React Router) works on refresh.
# ===========================================================
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ===========================================================
# Security headers — light touch, just a few sane defaults.
# ===========================================================
[[headers]]
  for   = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Hashed assets (Vite emits /assets/* with content hashes) get long cache.
[[headers]]
  for   = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html should always be revalidated so deploys are picked up fast.
[[headers]]
  for   = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"